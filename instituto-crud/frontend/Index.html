<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OpenMind Tech</title>

    <link rel="stylesheet" href="/instituto-crud/frontend/css/style.css">

</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <h1>OpenMind Tech</h1>

    </nav>


    <!-- CONTENEDOR PRINCIPAL -->
    <main class="contenedor">

        <!-- FORMULARIO -->
        <section class="formulario-container">

            <h2>Registrar Alumno</h2>

            <form id="formAlumno">

                <input
                    type="text"
                    id="nombre"
                    placeholder="Nombre"
                    required
                >

                <input
                    type="text"
                    id="apellido"
                    placeholder="Apellido"
                    required
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required
                >

                <input
                    type="text"
                    id="curso"
                    placeholder="Curso"
                    required
                >

                <input
                    type="number"
                    id="edad"
                    placeholder="Edad"
                    required
                >

                <button type="submit">
                    Agregar Alumno
                </button>

            </form>

        </section>


        <!-- LISTADO -->
        <section class="listado-container">

            <h2>Listado de Alumnos</h2>

            <div id="listaAlumnos" class="lista-alumnos">

            </div>

        </section>

    </main>


    <!-- FOOTER -->
    <footer class="footer">

        <p>© 2026 OpenMind Tech - Sistema de Gestión de Alumnos</p>

    </footer>

    <script src="/instituto-crud/frontend/js/app.js"></script>

</body>
</html>
