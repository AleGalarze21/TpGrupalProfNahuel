<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OpenMind Tech - Gestión de Alumnos</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="icon" href="../logo.png" type="image/png">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="logo">
            <img src="../logo.png" alt="Logo OpenMind Tech">
            <h1>OpenMind Tech</h1>
        </div>

        <div class="nav-menu">
            <a href="inicio.html">Inicio</a>
            <a href="crudAlumnos.html">Gestión Alumnos</a>
            <a href="accesoDenegado.html">Cursos</a>
            <a href="accesoDenegado.html">Alumnos</a>
            <a href="nosotros.html">Nosotros</a>
        </div>

        <div class="user-menu">

            <button class="user-btn" id="userBtn">
                <i class="fa-solid fa-user"></i>
            </button>

            <div class="dropdown" id="dropdown">
                <a href="#" id="btnLogin">Iniciar sesión</a>
                <a href="#" id="btnRegister">Registrarse</a>
            </div>

        </div>

    </nav>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="contenedor">

        <!-- FORMULARIO -->
        <section class="formulario-container">

            <div class="form-header">

                <h2>Registrar Alumno</h2>

                <p>
                    Completa la información del estudiante para incorporarlo al sistema.
                </p>

            </div>

            <form id="formAlumno">

                <div class="campo">

                    <label for="nombre">Nombre</label>

                    <input
                        type="text"
                        id="nombre"
                        placeholder="Ej. Juan"
                        required
                    >

                </div>

                <div class="campo">

                    <label for="apellido">Apellido</label>

                    <input
                        type="text"
                        id="apellido"
                        placeholder="Ej. Pérez"
                        required
                    >

                </div>

                <div class="campo">

                    <label for="email">Correo electrónico</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Ej. juan@email.com"
                        required
                    >

                </div>

                <div class="campo">

                    <label for="curso">Curso</label>

                    <input
                        type="text"
                        id="curso"
                        placeholder="Ej. Programación Web"
                        required
                    >

                </div>

                <div class="campo">

                    <label for="edad">Edad</label>

                    <input
                        type="number"
                        id="edad"
                        placeholder="18"
                        min="16"
                        max="100"
                        required
                    >

                </div>

                <button type="submit" class="btn-primary">

                    <i class="fa-solid fa-user-plus"></i>

                    Agregar Alumno

                </button>

            </form>

        </section>

        <!-- LISTADO -->
        <section class="listado-container">

            <h2>Listado de Alumnos</h2>

            <div id="listaAlumnos" class="lista-alumnos"></div>

        </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">

        <div class="footer-contenido">

            <div class="footer-logo">
                <img src="../logo.png" alt="Logo OpenMind Tech">
                <h3>OpenMind Tech</h3>
            </div>

            <div class="footer-copy">
                <p>© 2026 OpenMind Tech - Todos los derechos reservados.</p>
            </div>

        </div>

    </footer>

    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
